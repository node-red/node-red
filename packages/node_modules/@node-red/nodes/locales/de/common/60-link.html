<script type="text/html" data-help-name="link in">
    <p>Erstellung virtueller Verbindungen (Links) zwischen Flows.</p>
    <h3>Details</h3>
    <p>Der Node kann mit jedem beliebigen <code>link out</code>-Node in einen beliebigen Flow-Tab verlinkt werden.
       Sobald sie verlinkt sind, verhalten sie sich so, als wären sie direkt miteinander verbunden.</p>
    <p>Die Links zwischen Link-Nodes werden nur angezeigt, wenn ein Link-Node ausgewählt ist.
       Wenn Links zu anderen Flow-Tabs vorhanden sind, werden virtuelle Link-Nodes als Gegenparts angezeigt,
       über die durch Klicken zum entsprechenden Flow-Tab gesprungen werden kann.</p>
    <p><b>Hinweis</b>: Links können zu Subflows weder ein- noch ausgehend erstellt werden.</p>
</script>

<script type="text/html" data-help-name="link out">
    <p>Erstellung virtueller Verbindungen (Links) zwischen Flows.</p>
    <h3>Details</h3>
    <p>Der Node wird konfiguriert, entweder mit jedem beliebigen <code>link in</code>-Node in einen beliebigen Flow-Tab verlinkt zu werden,
       oder die Antwort zurück zu dem <code>link call</code>-Node zu senden, der den Flow gestartet hat.</p>
    <p>Im 'an alle verbundenen Link-Nodes' Modus, werden die Links zwischen Link-Nodes nur angezeigt, wenn ein Link-Node ausgewählt ist.
       Wenn Links zu anderen Flow-Tabs vorhanden sind, werden virtuelle Link-Nodes als Gegenparts angezeigt,
       über die durch Klicken zum entsprechenden Flow-Tab gesprungen werden kann.</p>
    <p><b>Hinweis</b>: Links können zu Subflows weder ein- noch ausgehend erstellt werden.</p>
</script>

<script type="text/html" data-help-name="link call">
    <p>Ruft einen Flow auf, der mit einer <code>link in</code>-Node startet und gibt das entsprechende Ergebnis aus.</p>
    <h3>Eingang</h3>
    <dl class="message-properties">
      <dt class="optional">target<span class="property-type">string</span></dt>
      <dd>Wenn der Parameter <b>Link-Typ</b> auf 'dynamisches Ziel' gesetzt ist, wird mit <code>msg.target</code> der 
          Ziel-<code>link in</code>-Node festgelegt.</dd>
    </dl>
    <h3>Details</h3>
    <p>Der Node kann mit jedem beliebigen <code>link in</code>-Node in einen beliebigen Flow-Tab verlinkt werden.</p>
    <p>Der Flow, mit dem diese Node verbunden ist, muss mit einem <code>link out</code>-Node, konfiguriert
       mit 'Zurück zur aufrufenden Link-Node' Mode, verbunden sein.</p>
    <p>Eine eingehende Nachricht wird an den verbundenen <code>link in</code>-Node weitergeleitet.
       Danach wird auf eine Antwort gewartet, um diese dann weiterzusenden.</p>
    <p>Wird innerhalb des konfigurierten Timeouts (Defaultwert 30s) keine Antwort empfangen, meldet der Node einen Fehler,
       der mit einem <code>catch</code>-Node aufgenommen werden kann.</p>
    <p>Ist der Parameter <b>Link-Typ</b> auf 'dynamisches Ziel' gesetzt, kann mit <code>msg.target</code> der aufzurufende
       <code>link in</code>-Node mit Namen oder Id festgelegt werden:</p>
    <ul>
      <li>Wenn es einen <code>link in</code>-Node mit der gleichen Id gibt, wird er aufgerufen</li>
      <li>Wenn es mehrere  <code>link in</code>-Nodes mit dem gleichen Namen gibt, wird ein Fehler gemeldet</li>
      <li>Ein <code>link call</code>-Node kann keinen <code>link in</code>-Node innerhalb eines Subflows aufrufen</li>
    </ul>
</script>
